daily:
  max_papers: 20
  lookback_days: 30
  timezone: Asia/Shanghai
  dedupe_history: true

report:
  title: Paper Reading
  language: zh
  output_dir: docs
  history_dir: reports
  data_dir: data

filters:
  require_keywords: true
  keyword_optional_sources:
    - nature
    - science
  keywords:
    - [large language model, llm, agent, multimodal, foundation model, artificial intelligence, machine learning, deep learning, neural network]
    - [earth, climate, weather, atmosphere, atmospheric, ocean, geoscience, remote sensing, environmental]
  exclude_keywords: []

selection:
  source_minimums:
    nature: 4
    science: 4

ranking:
  source_priority:
    nature: 35
    science: 35
    arxiv: 10

sources:
  arxiv:
    enabled: true
    categories:
      - cs.AI
      - cs.CL
      - cs.LG
      - eess.IV
      - physics.ao-ph
      - physics.geo-ph
      - stat.ML
    fetch_limit: 300
  journals:
    enabled: true
    fetch_limit_per_journal: 200
    article_only: true
    exclude_title_patterns:
      - "^Author Correction:"
      - "^Publisher Correction:"
      - "^Correction:"
      - "^Retraction:"
      - "^Editorial:"
      - "^Comment:"
      - "^Correspondence:"
      - "^News"
      - "^News & Views"
      - "^Research Highlight"
      - "^Research Highlights"
      - "^This Week in Science"
      - "^Editor's Choice"
      - "^Editor's summary"
      - "^In Brief"
      - "^Careers"
      - "^Books & Arts"
      - "^Obituary"
      - "^Outlook"
    items:
      - id: nature
        name: Nature
        enabled: true
        include_doi_patterns:
          - "^10\\.1038/s41586-"
        issns:
          - 1476-4687
          - 0028-0836
      - id: science
        name: Science
        enabled: true
        include_doi_patterns:
          - "^10\\.1126/science\\.[a-z0-9]+$"
        require_abstract: true
        min_references: 5
        issns:
          - 1095-9203
          - 0036-8075

llm:
  enabled: true
  provider: openai-compatible
  api_key_env:
    - OPENAI_API_KEY
    - LLM_API_KEY
  base_url_env:
    - OPENAI_BASE_URL
    - LLM_BASE_URL
  model_env:
    - OPENAI_MODEL
    - LLM_MODEL
  base_url: https://api.openai.com/v1
  model: gpt-4.1-mini
  temperature: 0.2
  timeout_seconds: 90
  max_input_chars_per_paper: 1800

email:
  enabled: true
  provider: gmail-smtp
  host: smtp.gmail.com
  port: 587
  use_tls: true
  username_env:
    - GMAIL_USERNAME
    - SMTP_USERNAME
  password_env:
    - GMAIL_APP_PASSWORD
    - SMTP_PASSWORD
  from_env:
    - MAIL_FROM
    - GMAIL_USERNAME
  to_env:
    - MAIL_TO
  subject_prefix: "[Paper Reading]"
  timeout_seconds: 60

http:
  user_agent: paper-reading-bot/0.1
  mailto: ""
  timeout_seconds: 90
